<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>مغامرة البطل – جدول ٤</title>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#061b32;
  color:#fff;
  text-align:center;
}

#game-container{
  width:480px;
  margin:30px auto;
  padding:25px;
  border-radius:20px;
  background:rgba(0,0,0,.55);
  box-shadow:0 0 30px #00eaff;
  position:relative;
  overflow:hidden;
}

/* البطل */
#hero-img{
  width:170px;
  animation:float 2s infinite;
}
@keyframes float{
  50%{transform:translateY(-10px)}
}

/* الوحش */
#monster-box{
  background:#1f4068;
  padding:15px;
  border-radius:20px;
  margin-top:15px;
}
#monster-img{
  width:140px;
}

/* شريط الطاقة */
#monster-hp{
  width:90%;
  height:22px;
  background:#333;
  margin:10px auto;
  border-radius:10px;
  overflow:hidden;
}
#monster-hp-inner{
  height:100%;
  width:100%;
  background:#2aff6d;
}

/* القذيفة */
#bullet{
  width:12px;
  height:12px;
  background:yellow;
  border-radius:50%;
  position:absolute;
  left:120px;
  bottom:190px;
  display:none;
}

/* إدخال */
input{
  padding:10px;
  font-size:24px;
  width:200px;
  border-radius:10px;
  border:none;
}
button{
  padding:12px 30px;
  font-size:24px;
  margin-top:10px;
  border-radius:14px;
  border:none;
  background:#00eaff;
  cursor:pointer;
}
</style>
</head>

<body>

<h1>⚔️ مغامرة البطل ⚔️</h1>

<div id="game-container">

<img src="hero.png" id="hero-img<div id="bullet"></div>

<div>
المستوى: <span id="level">١</span> |
النقاط: <span id="score">٠</span>
</div>

<div id="monster-box">
  <img src="monster.png" id="monster-img  <div id="monster-hp">
    <div id="monster-hp-inner"></div>
  </div>
  طاقة الوحش: <span id="hp">١٠٠</span>%
</div>

<div id="question" style="font-size:30px;margin-top:15px"></div>

<input id="answer" type="number" placeholder="الجواب">
<br>
<button onclick="attack()">🔫 إطلاق</button>

</div>

<script>
let level=1, score=0, a=1;
let monsterHP=100;

/* أرقام عربية */
function ar(n){
  return n.toString().replace(/\d/g,d=>"٠١٢٣٤٥٦٧٨٩"[d]);
}

/* سؤال */
function question(){
  a=Math.floor(Math.random()*10)+1;
  document.getElementById("question").innerHTML=
   "كم يساوي ٤ × "+ar(a)+" ؟";
}
question();

/* هجوم */
function attack(){
  let v=parseInt(answer.value);
  if(v===a*4){
    shoot();
    monsterHP-=20;
    score+=10;
    if(monsterHP<=0){
      level++;
      monsterHP=100;
      document.getElementById("level").innerHTML=ar(level);
    }
  }else{
    monsterHP=Math.min(100,monsterHP+10);
    score=Math.max(0,score-5);
  }
  update();
  answer.value="";
  question();
}

/* قذيفة */
function shoot(){
  let b=document.getElementById("bullet");
  b.style.display="block";
  let x=120;
  let t=setInterval(()=>{
    x+=15;
    b.style.left=x+"px";
    if(x>330){
      clearInterval(t);
      b.style.display="none";
    }
  },30);
}

/* تحديث */
function update(){
  document.getElementById("score").innerHTML=ar(score);
  document.getElementById("hp").innerHTML=ar(monsterHP);
  document.getElementById("monster-hp-inner").style.width=monsterHP+"%";
}
</script>

</body>
</html>
